services:

  server:
    image: wss-server:dev
    build:
      context: ..
      dockerfile: docker/Dockerfile.server
    networks:
      wss:
        aliases:
          - access-manager.kanyuka.info
    environment:
      WSS_SERVER_HOST: "0.0.0.0"
      WSS_SERVER_PORT: "8765"
      WSS_DB_PATH: /data/wss.db
      WSS_CA_CERT: /certs/ca.crt
      WSS_CA_KEY: /certs/ca.key
      WSS_SERVER_CERT: /certs/server.crt
      WSS_SERVER_KEY: /certs/server.key
      WSS_MEMCACHED_HOST: "127.0.0.1"
      WSS_MEMCACHED_PORT: "11211"
      WSS_MGMT_SOCKET: "tcp://0.0.0.0:8766"
    volumes:
      - server_data:/data
      - ./certs:/certs:ro
    ports:
      - "${WSS_PORT:-8765}:8765"
      - "${WSS_MGMT_PORT:-8766}:8766"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import socket; s=socket.create_connection(('127.0.0.1',8765),timeout=5); s.close()"]
      interval: 5s
      timeout: 10s
      retries: 10
      start_period: 5s

  client:
    image: wss-client:dev
    build:
      context: ..
      dockerfile: docker/Dockerfile.client
    networks:
      - wss
    environment:
      WSS_SERVER_HOST: "access-manager.kanyuka.info"
      WSS_SERVER_PORT: "8765"
      WSS_CLIENT_DATA_DIR: /data
      WSS_CLIENT_MGMT_SOCKET: "tcp://0.0.0.0:8767"
    volumes:
      - client_data:/data
      - ./certs:/certs:ro
    ports:
      - "${WSS_CLIENT_MGMT_PORT:-8767}:8767"
    depends_on:
      server:
        condition: service_healthy
    profiles:
      - client
    restart: "no"

volumes:
  server_data:
  client_data:

networks:
  wss:
    driver: bridge
